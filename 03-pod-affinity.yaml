apiVersion: v1
kind: Pod 
metadata:
  name: nginx-affinity
  labels:
    env: tests
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: disktype
            operator: In
            values:
            - us-east-1a
  containers:
  - name: nginx
    image: nginx           