apiVersion: v1
kind: Pod 
metadata:
  name: nginx-affinity
  labels:
    env: tests
spec:
  affinity:
    nodeAffinity:
    # Hard rule
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values:
            - us-east-1b
            - us-east-1d
      # Soft rule 
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - roboshop
      - weight: 10
        preference:
          matchExpressions:
          - key: project
            operator: In
            values:
            - amazon           
  containers:
  - name: nginx
    image: nginx           